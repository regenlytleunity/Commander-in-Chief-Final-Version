function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function expScale(val, base) { return base * Math.pow(1.025, val); }

// Diminishing returns: as stat approaches threshold, penalties shrink
// At threshold buffer zone (within 15 of GO), penalties reduced up to 70%
function diminish(penalty, currentStat, threshold) {
  if (penalty >= 0) return penalty; // only diminish negatives
  var buffer = 15;
  var distFromDeath = currentStat - threshold;
  if (distFromDeath >= buffer) return penalty; // far from death, full penalty
  if (distFromDeath <= 0) return Math.round(penalty * 0.3); // at/past threshold, 70% reduction

  var reduction = 0.3 + 0.7 * pct; // 0.3 to 1.0
  return Math.round(penalty * reduction);
}

  { id: "bonus_worlds_fair", year: 1893, duration: "instant", title: "World's Columbian Exposition \u2605", desc: "★ BONUS: Chicago hosts a massive World's Fair to celebrate 400 years since Columbus! It's a chance to showcase American innovation and culture to the entire world.", termDef: "\u2605 BONUS: Not a test term!", choices: [

  { id: "spanish_american_war", year: 1898, duration: "short", title: "The Spanish-American War", desc: "Cuba fights for independence from Spain. The USS Maine has exploded in Havana harbor. 'Remember the Maine!' cry the newspapers. War is expensive but could yield an American empire spanning the globe.", termDef: "Spanish-American War (1898): USA helps Cuba, wants imperial power.", choices: [

  { id: "manila_bay", year: 1898, duration: "instant", title: "Battle of Manila Bay", desc: "Admiral Dewey's fleet approaches the Spanish squadron in Manila Bay, Philippines. The fate of the Pacific — and America's place as a world power — hangs in the balance.", termDef: "Battle of Manila Bay: Major USA victory, gains colonies.", choices: [

    { text: "Blockade and starve them out", dom: -5, intl: -5, pwr: 8, gold: -3, nations: { spain: -8, japan: -8, philippines: -5 }, policies: [], cost: 12 },

  ]},
  { id: "filipino_american_war", year: 1899, duration: "short", title: "Filipino-American War", desc: "The Philippines expected independence after Spain's defeat. Instead, America claims them as a colony. Filipino revolutionaries take up arms. Reports of American atrocities begin to trickle home.", termDef: "Filipino-American War (1899-1902): 200k deaths. USA commits war crimes.", choices: [

    { text: "Gradual self-governance \u2014 expensive transition", dom: -6, intl: 8, pwr: -5, gold: -8, nations: { philippines: 8, japan: 5, britain: -3 }, policies: ["Phil. Autonomy"], cost: 22 },
    { text: "Immediate independence \u2014 abandon Pacific position", dom: -8, intl: 12, pwr: -12, gold: 5, nations: { philippines: 25, japan: 12, britain: -8 }, policies: [], cost: 5 },

    { text: "Invite international observers to oversee transition", dom: -5, intl: 10, pwr: -8, gold: -5, nations: { philippines: 12, japan: 5, britain: 5 }, policies: ["Observed Transition"], cost: 15 },
  ]},
  { id: "platt_amendment", year: 1901, duration: "long", title: "The Platt Amendment", desc: "Cuba is now officially independent — sort of. You can insert a clause into Cuba's new constitution allowing the US to re-invade if 'things get out of hand.' Cuba's leaders are furious.", termDef: "Platt Amendment: USA can re-invade Cuba.", choices: [

  ]},
  { id: "mckinley_roosevelt", year: 1901, duration: "instant", title: "Roosevelt Takes Office", desc: "President McKinley has been assassinated. Vice President Theodore Roosevelt, the hero of San Juan Hill and leader of the Rough Riders, assumes the presidency. A new era begins.", termDef: "McKinley: President in Spanish-American War. Roosevelt: After. Rough Riders / San Juan Hill.", choices: [

    { text: "Continue McKinley's cautious policies", dom: -5, intl: -3, pwr: -5, gold: 5, nations: { britain: -3 }, policies: [], cost: 0 },

    { text: "Double military spending \u2014 prepare for anything", dom: 5, intl: -10, pwr: 20, gold: -18, nations: { germany: -10, japan: -10, britain: 3 }, policies: ["Military Buildup"], cost: 35 },
  ]},
  { id: "roosevelt_corollary", year: 1904, duration: "long", title: "The Roosevelt Corollary", desc: "Latin American nations are defaulting on debts to European powers. European warships threaten to intervene. Roosevelt proposes an addition to the Monroe Doctrine: America will police the entire hemisphere.", termDef: "Roosevelt Corollary: USA is world police.", choices: [

  ]},
  { id: "panama_canal", year: 1904, duration: "long", title: "The Panama Canal", desc: "A canal through Central America would transform global trade and give the US Navy quick passage between oceans. But Panama is part of Colombia, and Colombia says no...", termDef: "Panama Canal (1904-1914): Massive canal by USA.", choices: [
    { text: "Support Panamanian independence, build canal", dom: 8, intl: -12, pwr: 22, gold: -22, nations: { panama: 12, mexico: -12, britain: 5 }, policies: [], cost: 95, purchase: "Panama Canal" },
    { text: "Pay Colombia triple \u2014 keep it clean", dom: -5, intl: 5, pwr: 8, gold: -18, nations: { panama: -8, mexico: 5 }, policies: [], cost: 75, purchase: "Canal (expensive)" },

    { text: "Build canal with exclusive US military control", dom: 5, intl: -15, pwr: 25, gold: -25, nations: { panama: -5, mexico: -15, britain: -8 }, policies: ["Military Canal"], cost: 100, purchase: "Fortified Canal" },
    { text: "Delay canal, invest in transcontinental railroads", dom: 8, intl: -5, pwr: -3, gold: -10, nations: { panama: -3 }, policies: ["Railroad Expansion"], cost: 30 },
  ]},
  { id: "great_white_fleet", year: 1907, duration: "short", title: "The Great White Fleet", desc: "Roosevelt wants to send the entire US Navy on a world tour — 16 gleaming white battleships circling the globe. It's an awe-inspiring display of power with an equally awe-inspiring price tag.", termDef: "Great White Fleet: State-of-the-art navy by Roosevelt.", choices: [

  ]},
  { id: "wilson_neutrality", year: 1914, duration: "short", title: "Wilson and the Great War", desc: "War erupts across Europe. President Wilson, an academic who never wanted this, declares American neutrality. But both sides want American support — and American trade is enormously profitable.", termDef: "Wilson: WWI president, academic. Didn't want to join.", choices: [
    { text: "Strict neutrality \u2014 lose trade from all", dom: 5, intl: -5, pwr: -6, gold: -12, nations: { britain: -8, france: -8, germany: -8 }, policies: ["Strict Neutrality"], cost: 0 },
    { text: "Trade with everyone \u2014 profit from war", dom: -6, intl: -8, pwr: 8, gold: 22, nations: { germany: -12, britain: 5, france: 5 }, policies: ["War Profiteering"], cost: 0 },
    { text: "Lean toward Allies \u2014 paint a target", dom: -5, intl: -6, pwr: 8, gold: 12, nations: { britain: 12, france: 12, germany: -22 }, policies: ["Pro-Allied"], cost: 0 },
    { text: "Offer to mediate between all parties", dom: 3, intl: 10, pwr: -5, gold: -5, nations: { britain: 3, france: 3, germany: 3 }, policies: ["Mediator"], cost: 10 },
    { text: "Secretly prepare for war while publicly neutral", dom: -3, intl: -3, pwr: 10, gold: -10, nations: { germany: -5 }, policies: ["Secret Prep"], cost: 25 },
    { text: "Sell exclusively to the Allies on credit", dom: -8, intl: -10, pwr: 5, gold: 18, nations: { britain: 15, france: 12, germany: -25 }, policies: ["Allied Credit"], cost: 0 },
  ]},
  { id: "lusitania", year: 1915, duration: "instant", title: "Sinking of the Lusitania", desc: "A German U-boat has torpedoed the British passenger liner Lusitania. 1,198 people are dead, including 128 Americans. The nation is outraged. Germany claims the ship was carrying munitions.", termDef: "Lusitania: British ship sunk, pulled USA toward WWI.", choices: [

    { text: "Demand Germany cease civilian attacks", dom: -5, intl: -3, pwr: -5, gold: 0, nations: { germany: -8, britain: -3 }, policies: [], cost: 5 },
    { text: "Investigate if Lusitania carried weapons", dom: -10, intl: 6, pwr: -6, gold: 5, nations: { germany: 5, britain: -12, france: -8 }, policies: [], cost: 5 },
    { text: "Sever all diplomatic ties with Germany", dom: 5, intl: -5, pwr: 5, gold: -5, nations: { germany: -18, britain: 8, france: 8 }, policies: ["Severed Ties"], cost: 8 },
    { text: "Demand massive financial reparations from Germany", dom: 8, intl: -3, pwr: 3, gold: 10, nations: { germany: -15, britain: 5 }, policies: [], cost: 3 },
    { text: "Use the tragedy to rally support for military buildup", dom: 10, intl: -5, pwr: 15, gold: -15, nations: { germany: -10, britain: 5 }, policies: ["War Prep"], cost: 20 },
  ]},
  { id: "unrestricted_submarines", year: 1917, duration: "instant", title: "Unrestricted Submarine Warfare", desc: "Germany has resumed unrestricted submarine warfare — any ship in the war zone will be sunk on sight, neutral or not. American merchant ships are now targets every time they cross the Atlantic.", termDef: "Unrestricted Submarine Warfare: German WWI strategy.", choices: [
    { text: "Prepare for war \u2014 this crosses every line", dom: 8, intl: -6, pwr: 12, gold: -12, nations: { germany: -22, britain: 8, france: 8 }, policies: [], cost: 28 },
    { text: "Arm merchant ships \u2014 satisfies nobody", dom: -5, intl: -3, pwr: 5, gold: -8, nations: { germany: -8, britain: -3 }, policies: ["Armed Neutrality"], cost: 18 },
    { text: "Suspend shipping \u2014 economic catastrophe", dom: -12, intl: 5, pwr: -8, gold: -22, nations: { germany: 5, britain: -12 }, policies: [], cost: 0 },

  ]},
  { id: "zimmerman_telegram", year: 1917, duration: "instant", title: "The Zimmermann Telegram", desc: "British intelligence has intercepted a German telegram to Mexico, proposing a military alliance. If Mexico attacks America, Germany promises to help them reclaim Texas, New Mexico, and Arizona.", termDef: "Zimmermann Telegram (1917): Germany to Mexico, attack USA.", choices: [
    { text: "Publish and declare war on Germany", dom: 18, intl: -5, pwr: 18, gold: -18, nations: { germany: -35, mexico: -8, britain: 18, france: 18 }, policies: ["WWI Entry"], cost: 50 },
    { text: "Use as leverage \u2014 Germany knows you're bluffing", dom: -6, intl: -3, pwr: -3, gold: 0, nations: { germany: -12, mexico: -3 }, policies: [], cost: 5 },
    { text: "Confront Mexico publicly \u2014 humiliate a neighbor", dom: 5, intl: -8, pwr: 5, gold: 0, nations: { mexico: -12, germany: -3 }, policies: [], cost: 5 },

    { text: "Offer Mexico a counter-deal to reject Germany", dom: -3, intl: 3, pwr: 3, gold: -8, nations: { mexico: 8, germany: -8 }, policies: [], cost: 15 },
    { text: "Classify it and use it for intelligence purposes", dom: -5, intl: -5, pwr: 10, gold: 0, nations: { germany: -5 }, policies: ["Intel Ops"], cost: 3 },
  ]},
  { id: "armistice", year: 1918, duration: "instant", title: "Armistice \u2014 End of WWI", desc: "After over a year of American involvement, Germany requests a ceasefire. The Great War is ending. Millions are dead. Now comes the hardest question: what kind of peace will follow?", termDef: "Armistice: Ceasefire ending WWI.", choices: [
    { text: "Fair peace \u2014 anger hardliners at home", dom: -6, intl: 12, pwr: -5, gold: 5, nations: { germany: 8, britain: 5, france: -8 }, policies: [], cost: 0 },
    { text: "Push into Germany \u2014 decisive but costly", dom: 5, intl: -12, pwr: 12, gold: -22, nations: { germany: -25, britain: 5, france: 8 }, policies: [], cost: 40 },
    { text: "Accept but skip peace talks", dom: 5, intl: -10, pwr: -6, gold: 12, nations: { britain: -12, france: -12, germany: 5 }, policies: ["Post-War Isolation"], cost: 0 },
    { text: "Demand massive German reparations to allies", dom: 3, intl: -5, pwr: 5, gold: 8, nations: { germany: -22, britain: 8, france: 12 }, policies: [], cost: 0 },
    { text: "Propose a new international order", dom: -8, intl: 15, pwr: -3, gold: -8, nations: { britain: 8, france: 5, germany: 5 }, policies: ["New Order"], cost: 12 },
    { text: "Focus on bringing troops home quickly", dom: 12, intl: -5, pwr: -8, gold: 5, nations: { britain: -5, france: -8 }, policies: [], cost: 0 },
  ]},
  { id: "fourteen_points", year: 1919, duration: "instant", title: "Wilson's 14 Points", desc: "Wilson presents his 14 Points to restructure the world after WWI: rethink colonialism, self-determination for peoples, free seas, no more tariffs, and a League of Nations to prevent future wars.", termDef: "14 Points: Wilson's plan \u2014 rethink colonialism, self-determination, free seas.", choices: [
    { text: "Champion all 14 points \u2014 alienate Congress", dom: -10, intl: 18, pwr: 5, gold: -8, nations: { britain: 5, france: -5, germany: 8, japan: 5 }, policies: ["Wilsonian Idealism"], cost: 18 },
    { text: "Compromise \u2014 punish Germany, breed resentment", dom: -5, intl: 5, pwr: 5, gold: 0, nations: { germany: -22, britain: 8, france: 12 }, policies: [], cost: 5 },
    { text: "Focus on American interests \u2014 betray ideals", dom: 8, intl: -10, pwr: 8, gold: 12, nations: { britain: -8, france: -8, germany: -5 }, policies: [], cost: 0 },
    { text: "Push for free trade above all else", dom: 5, intl: 8, pwr: -3, gold: 10, nations: { britain: 5, france: 3 }, policies: ["Free Trade"], cost: 5 },
    { text: "Demand colonial self-determination \u2014 anger empires", dom: -3, intl: 12, pwr: -5, gold: -5, nations: { britain: -12, france: -10, germany: 5, japan: -5 }, policies: ["Decolonization"], cost: 8 },
    { text: "Prioritize freedom of the seas and disarmament", dom: -3, intl: 10, pwr: -10, gold: 3, nations: { britain: -5, germany: 8 }, policies: ["Naval Disarm"], cost: 5 },
  ]},
  { id: "league_of_nations", year: 1920, duration: "instant", title: "The League of Nations Debate", desc: "Wilson's League of Nations is ready — a global body to prevent future wars. But Senator Henry Cabot Lodge leads fierce opposition in the Senate, which must ratify the treaty.", termDef: "League of Nations: Proposed by USA. Lodge opposed. Internationalist: global cooperation.", choices: [

    { text: "Compromise with Lodge \u2014 watered-down League", dom: -5, intl: -3, pwr: -3, gold: 0, nations: { britain: -3, france: -3 }, policies: ["Modified League"], cost: 5 },
    { text: "Abandon the League \u2014 allies despair", dom: 8, intl: -12, pwr: -6, gold: 8, nations: { britain: -12, france: -12 }, policies: ["League Rejection"], cost: 0 },

  function startAchBatch() {
    pendingAchRef.current = Object.assign({}, achievements);

  function flushAchBatch() {
    if (!pendingAchRef.current) return;
    var na = pendingAchRef.current;
    setAchievements(na);
    saveAch(na);
    pendingAchRef.current = null;
    // Show popups sequentially
    var queue = popupQueueRef.current;
    if (queue.length > 0) {
      var showNext = function(i) {
        if (i >= queue.length) return;
        setAchPopup(queue[i]);
        setTimeout(function() { setAchPopup(null); setTimeout(function() { showNext(i + 1); }, 300); }, 2500);
      };
      showNext(0);
    }
    popupQueueRef.current = [];
  }

    var tier = getTier(eventCount);

    var current = pendingAchRef.current || achievements;

    if (isSecret) {
      if (current[id]) return;
      var na = pendingAchRef.current || Object.assign({}, achievements);
      na[id] = true;
      if (pendingAchRef.current) {

    na[id] = { tier: tier };

      setAchievements(na); saveAch(na);
      if (def) {
        var popDef = Object.assign({}, def, { tierLabel: isUpgrade ? "Upgraded to " + tier + "!" : tier + " unlocked!" });
        setAchPopup(popDef); setTimeout(function() { setAchPopup(null); }, 3500);
      }
    }
  }

  function calcIncome() {
    var baseIncome = expScale(stats.dom, 8);
    var warDrain = Object.keys(wars).filter(function(k) { return wars[k]; }).length * 10;
    var pwrReduction = expScale(stats.pwr, 1);
    return Math.max(1, Math.round(baseIncome * diff.goldMult) - Math.round(warDrain / pwrReduction));
  }
  function calcRepDrift() { return Math.round(stats.intl * 0.04); }
  function calcWarCostMult() { return 1 / expScale(stats.pwr, 1); }

  var income = calcIncome();
  var repDrift = calcRepDrift();

  // Pick 3 random choices from 6
  function pickChoices(event) {
    var all = event.choices.length;
    var idxs = shuffle(Array.from({ length: all }, function(_, i) { return i; }));
    return idxs.slice(0, 3);
  }

  function rerollChoices() {
    if (!evt || gold < diff.rerollCost) return;
    setGold(function(p) { return p - diff.rerollCost; });
    setSpent(function(p) { return p + diff.rerollCost; });
    var old = shownChoiceIdxs;
    var allIdxs = Array.from({ length: evt.choices.length }, function(_, i) { return i; });
    var hidden = allIdxs.filter(function(i) { return old.indexOf(i) === -1; });
    // Guarantee at least 1 new choice
    if (hidden.length === 0) return;
    var guaranteed = hidden[Math.floor(Math.random() * hidden.length)];
    var pool = allIdxs.filter(function(i) { return i !== guaranteed; });
    var shuffled = shuffle(pool);
    var rest = shuffled.slice(0, 2);
    setShownChoiceIdxs(shuffle([guaranteed].concat(rest)));
    setRerollCount(function(p) { return p + 1; });
  }

  function initGame() {
    var d = DIFF[difficulty];
    var req = SORTED_EVENTS.filter(function(e) { return !e.id.startsWith("bonus_"); });
    var bon = SORTED_EVENTS.filter(function(e) { return e.id.startsWith("bonus_"); });
    var pool = req.slice();
    bon.forEach(function(b) { if (Math.random() > 0.3) pool.push(b); });
    pool.sort(function(a, b) { return a.year - b.year; });
    var ct = Math.min(eventCount, pool.length);
    var step = pool.length / ct;
    var sel = [];
    for (var i = 0; i < ct; i++) sel.push(pool[Math.min(Math.floor(i * step), pool.length - 1)]);
    var seen = {};
    var unique = sel.filter(function(e) { if (seen[e.id]) return false; seen[e.id] = true; return true; });
    setGameEvents(unique); setIdx(0);
    setStats({ dom: 25, intl: 25, pwr: 25 });
    setGold(d.startGold); setSpent(0); setEarned(d.startGold);
    var ir = {}; NATIONS.forEach(function(n) { ir[n.id] = 0; });
    setRelations(ir); setPolicies([]); setPurchases([]); setHistory([]);
    setResult(null); setShowTerm(false); setGameOver(null); setFadeIn(true);
    setTab("event"); setLoans({}); setWars({});
    setExpHistory({}); setExpNation({}); setRerollCount(0); setUsedEmergency({});
    if (unique.length > 0) setShownChoiceIdxs(pickChoices(unique[0]));
  }

  function applyStat(val, stat) {
    var raw = val < 0 ? Math.round(val * diff.punishMult) : Math.round(val * diff.statMult);
    if (raw < 0 && stat !== undefined) return diminish(raw, stat, diff.goThresh);
    return raw;
  }
  function costOf(c) { return Math.round((c.cost || 0) * diff.costMult); }

  function checkMidAch(ns, nr, nw, nl, newGold) {
    if (Object.keys(nl || loans).filter(function(k) { return (nl || loans)[k] > 0; }).length >= 3) unlock("loan_shark");
    if (Object.keys(nw || wars).filter(function(k) { return (nw || wars)[k]; }).length >= 3) unlock("warmonger");
    // Secret: billionaire
    var g = newGold !== undefined ? newGold : gold;
    if (g >= 1000) unlock("sec_billionaire");
  }

  function checkEndAch() {
    startAchBatch();
    if (difficulty === "easy") unlock("beat_easy");
    if (meetsMinDiff(difficulty, "normal")) unlock("beat_normal");
    if (meetsMinDiff(difficulty, "hard")) unlock("beat_hard");
    if (meetsMinDiff(difficulty, "brutal")) unlock("beat_brutal");
    unlock("scholar");
    if (meetsMinDiff(difficulty, "hard") && purchases.length >= 5) unlock("all_territory");
    if (meetsMinDiff(difficulty, "hard") && !Object.values(relations).some(function(v) { return v < -30; })) unlock("pacifist");
    if (meetsMinDiff(difficulty, "hard") && stats.dom >= STAT_MAX) unlock("max_dom");
    if (meetsMinDiff(difficulty, "hard") && stats.intl >= STAT_MAX) unlock("max_intl");
    if (meetsMinDiff(difficulty, "hard") && stats.pwr >= STAT_MAX) unlock("max_pwr");
    if (meetsMinDiff(difficulty, "normal") && Object.keys(loans).filter(function(k) { return loans[k] > 0; }).length === 0 && gold >= 100) unlock("debt_free");
    if (Math.round((stats.dom + stats.intl + stats.pwr + 150) / 3) >= 90) unlock("s_rank");
    flushAchBatch();
  }

  function triggerGameOver(msg, fromCeasefire) {
    if (difficulty === "easy") unlock("sec_easy_loss");
    if (fromCeasefire) unlock("sec_ceasefire");
    setGameOver(msg);
  }

  function applyChoice(c) {
    var cost = costOf(c);
    if (cost > gold) return;
    var ns = {
      dom: clamp(stats.dom + applyStat(c.dom, stats.dom), -STAT_MAX, STAT_MAX),
      intl: clamp(stats.intl + applyStat(c.intl, stats.intl), -STAT_MAX, STAT_MAX),
      pwr: clamp(stats.pwr + applyStat(c.pwr, stats.pwr), -STAT_MAX, STAT_MAX),
    };
    var ng = Math.max(0, gold + Math.round((c.gold || 0) * diff.goldMult) - cost);
    var nr = Object.assign({}, relations);
    if (c.nations) { Object.keys(c.nations).forEach(function(nid) { if (nr[nid] !== undefined) nr[nid] = clamp(nr[nid] + applyStat(c.nations[nid]), -100, 50); }); }
    var nw = Object.assign({}, wars);
    if (diff.warThresh != null) { Object.keys(nr).forEach(function(nid) { if (nr[nid] <= diff.warThresh && !nw[nid]) { var nat = NATIONS.find(function(n) { return n.id === nid; }); if (nat && evt && evt.year >= nat.intro) nw[nid] = true; } }); }
    setStats(ns); setGold(ng); setSpent(function(p) { return p + cost; });
    if (Math.round((c.gold || 0) * diff.goldMult) > 0) setEarned(function(p) { return p + Math.round((c.gold || 0) * diff.goldMult); });
    setRelations(nr); setWars(nw);
    if (c.policies && c.policies.length) setPolicies(function(p) { return p.concat(c.policies); });
    if (c.purchase) setPurchases(function(p) { return p.concat([c.purchase]); });
    setResult(Object.assign({}, c, { actualCost: cost }));
    setShowTerm(true);
    setHistory(function(p) { return p.concat([{ event: evt, choice: c, stats: ns, gold: ng }]); });
    checkMidAch(ns, nr, nw, loans, ng);
    var th = diff.goThresh;
    if (ns.dom <= th) setTimeout(function() { triggerGameOver("Impeachment. Your people turned on you."); }, 800);
    else if (ns.intl <= th) setTimeout(function() { triggerGameOver("America is an international pariah."); }, 800);
    else if (ns.pwr <= th) setTimeout(function() { triggerGameOver("America is irrelevant on the world stage."); }, 800);
  }

  function faceConsequences() {
    var domP = diminish(-Math.round(8 * diff.punishMult), stats.dom, diff.goThresh);
    var intlP = diminish(-Math.round(6 * diff.punishMult), stats.intl, diff.goThresh);
    var pwrP = diminish(-Math.round(5 * diff.punishMult), stats.pwr, diff.goThresh);
    var ns = { dom: clamp(stats.dom + domP, -STAT_MAX, STAT_MAX), intl: clamp(stats.intl + intlP, -STAT_MAX, STAT_MAX), pwr: clamp(stats.pwr + pwrP, -STAT_MAX, STAT_MAX) };
    setStats(ns);
    setResult({ text: "You couldn't act \u2014 crisis passes unresolved.", dom: domP, intl: intlP, pwr: pwrP, gold: 0, nations: {}, policies: [], cost: 0, actualCost: 0, isFaceConsequences: true });
    setShowTerm(true);
    setHistory(function(p) { return p.concat([{ event: evt, choice: { text: "Faced consequences" }, stats: ns, gold: gold }]); });
    var th = diff.goThresh;
    if (ns.dom <= th) setTimeout(function() { triggerGameOver("Paralyzed by poverty."); }, 800);
    else if (ns.intl <= th) setTimeout(function() { triggerGameOver("Unable to act, allies abandon you."); }, 800);
    else if (ns.pwr <= th) setTimeout(function() { triggerGameOver("Without funds, America fades."); }, 800);
  }

  // Emergency actions
  function emergencyFundraise() {
    if (usedEmergency.fundraise) return;
    var domCost = -Math.round(8 * diff.punishMult);
    setStats(function(p) { return { dom: clamp(p.dom + domCost, -STAT_MAX, STAT_MAX), intl: p.intl, pwr: p.pwr }; });
    setGold(function(p) { return p + 40; }); setEarned(function(p) { return p + 40; });
    setUsedEmergency(function(p) { return Object.assign({}, p, { fundraise: true }); });
  }
  function emergencyCeasefire(nid) {
    if (usedEmergency.ceasefire || !wars[nid]) return;
    var goldCost = Math.round(25 * diff.costMult);
    if (gold < goldCost) return;
    setGold(function(p) { return p - goldCost; }); setSpent(function(p) { return p + goldCost; });
    setWars(function(p) { var o = Object.assign({}, p); delete o[nid]; return o; });
    setRelations(function(p) { var o = Object.assign({}, p); o[nid] = clamp((o[nid] || 0) + 15, -100, 50); return o; });
    var newIntl = clamp(stats.intl - 5, -STAT_MAX, STAT_MAX);
    setStats(function(p) { return { dom: p.dom, intl: newIntl, pwr: p.pwr }; });
    setUsedEmergency(function(p) { return Object.assign({}, p, { ceasefire: true }); });
    // Secret: lose from ceasefire
    if (newIntl <= diff.goThresh) setTimeout(function() { triggerGameOver("The ceasefire cost you everything.", true); }, 800);
  }
  function emergencyRally() {
    if (usedEmergency.rally) return;
    setStats(function(p) { return { dom: clamp(p.dom + 12, -STAT_MAX, STAT_MAX), intl: clamp(p.intl - 8, -STAT_MAX, STAT_MAX), pwr: p.pwr }; });
    setUsedEmergency(function(p) { return Object.assign({}, p, { rally: true }); });
  }

  function nextEvent() {
    if (idx + 1 >= gameEvents.length) { checkEndAch(); setGameOver("victory"); return; }
    setFadeIn(false);
    setTimeout(function() {
      var nextIdx = idx + 1;
      setIdx(nextIdx);
      setResult(null); setShowTerm(false); setFadeIn(true);
      // Set new random choices for next event
      if (gameEvents[nextIdx]) setShownChoiceIdxs(pickChoices(gameEvents[nextIdx]));
      var inc = calcIncome();
      var ng = gold + inc;
      setEarned(function(p) { return p + inc; });
      var drift = calcRepDrift();
      var nr = Object.assign({}, relations);
      var nl = Object.assign({}, loans);
      Object.keys(nl).forEach(function(nid) { if (nl[nid] > 0) nr[nid] = clamp((nr[nid] || 0) - Math.max(2, Math.round(nl[nid] * 0.15)), -100, 50); });
      if (drift !== 0) { Object.keys(nr).forEach(function(nid) { var nat = NATIONS.find(function(n) { return n.id === nid; }); var ne = gameEvents[nextIdx]; if (nat && ne && ne.year >= nat.intro) nr[nid] = clamp(nr[nid] + drift, -100, 50); }); }
      var wk = Object.keys(wars).filter(function(k) { return wars[k]; });
      if (wk.length > 0) {
        var wcm = calcWarCostMult();
        setStats(function(p) { return {
          dom: clamp(p.dom + diminish(-Math.round(5 * wk.length * diff.punishMult * wcm), p.dom, diff.goThresh), -STAT_MAX, STAT_MAX),
          intl: clamp(p.intl + diminish(-Math.round(3 * wk.length * diff.punishMult * wcm), p.intl, diff.goThresh), -STAT_MAX, STAT_MAX),
          pwr: clamp(p.pwr - Math.round(2 * wk.length), -STAT_MAX, STAT_MAX),
        }; });
        var wd = Math.round(10 * wk.length * diff.costMult * wcm);
        ng = Math.max(0, ng - wd);
        setSpent(function(p) { return p + wd; });
      }
      var nw = Object.assign({}, wars);
      if (diff.warThresh != null) { Object.keys(nr).forEach(function(nid) { if (nr[nid] <= diff.warThresh && !nw[nid]) { var nat = NATIONS.find(function(n) { return n.id === nid; }); var ne = gameEvents[nextIdx]; if (nat && ne && ne.year >= nat.intro) nw[nid] = true; } }); }
      setRelations(nr); setLoans(nl); setWars(nw); setGold(ng);
    }, 250);
  }

  function takeLoan(nid, amt) {
    var nl = Object.assign({}, loans); nl[nid] = (nl[nid] || 0) + amt;
    setLoans(nl); setGold(function(p) { return p + amt; }); setEarned(function(p) { return p + amt; }); setLoanModal(null);
    checkMidAch(stats, relations, wars, nl);
  }
  function repayLoan(nid, amt) {
    var actual = Math.min(amt, gold, loans[nid] || 0); if (actual <= 0) return;
    setLoans(function(p) { var o = Object.assign({}, p); o[nid] = Math.max(0, (o[nid] || 0) - actual); if (!o[nid]) delete o[nid]; return o; });
    setGold(function(p) { return p - actual; }); setSpent(function(p) { return p + actual; });
    setRelations(function(p) { var o = Object.assign({}, p); o[nid] = Math.min(50, (o[nid] || 0) + Math.round(actual * 0.1)); return o; });
    setRepayModal(null);
  }
  function canLoan(nid) { return (relations[nid] || 0) >= diff.loanReq && !wars[nid]; }

  function getNationInfo(nid) {
    var impacts = [];
    history.forEach(function(h) { if (h.choice.nations && h.choice.nations[nid]) impacts.push({ year: h.event.year, title: h.event.title.replace(" \u2605", ""), amount: applyStat(h.choice.nations[nid]) }); });
    if (loans[nid] && loans[nid] > 0) impacts.push({ year: 0, title: "Loan (" + money(loans[nid]) + ")", amount: -Math.max(2, Math.round(loans[nid] * 0.15)), ongoing: true });
    if (repDrift !== 0) impacts.push({ year: 0, title: "Intl drift (" + signed(stats.intl) + ")", amount: repDrift, ongoing: true });
    var hints = [];
    if (difficulty === "easy" || difficulty === "normal") {
      var v = relations[nid] || 0;
      if (v < -20) { hints.push("Favor this nation in choices"); if (loans[nid] > 0) hints.push("Repay loan to stop drain"); hints.push("Raise Intl for passive recovery"); }
      else if (v < 10) hints.push("Few friendly decisions could create alliance");
      else hints.push("Strong \u2014 available for loans");
    }
    return { impacts: impacts, hints: hints };
  }

  var shownChoices = evt ? shownChoiceIdxs.map(function(i) { return evt.choices[i]; }).filter(Boolean) : [];
  var allBroke = shownChoices.every(function(c) { return costOf(c) > gold; });
  var activeNat = evt ? getActiveNations(evt.year) : [];
  var loanableNat = activeNat.filter(function(n) { return canLoan(n.id); });
  var warCount = Object.keys(wars).filter(function(k) { return wars[k]; }).length;
  var warNids = Object.keys(wars).filter(function(k) { return wars[k]; });

  var domDesc = "Income: " + money(Math.round(expScale(stats.dom, 8) * diff.goldMult)) + "/turn";
  var intlDesc = "Nations drift " + signed(repDrift) + " rep/turn";
  var pwrDesc = "War costs at " + Math.round(calcWarCostMult() * 100) + "%";

  var css = { "--bg": "#131210", "--card": "#1c1b17", "--border": "#2e2d28", "--text": "#e0d8c8", "--dim": "#8a8070", "--serif": "'Playfair Display', Georgia, serif", "--mono": "'DM Mono', 'Courier Prime', monospace", "--sans": "'DM Sans', sans-serif" };
  var base = Object.assign({}, css, { minHeight: "100vh", background: "var(--bg)", color: "var(--text)", fontFamily: "var(--serif)" });
  var fonts = <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />;

  var popupEl = achPopup ? (
    <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", zIndex: 200, padding: "12px 20px", background: achPopup.secret ? "rgba(139,58,58,0.95)" : "rgba(91,117,83,0.95)", border: "1px solid " + (achPopup.secret ? "rgba(139,58,58,0.6)" : "rgba(91,117,83,0.6)"), borderRadius: 10, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 8px 32px rgba(0,0,0,0.5)" }}>
      <span style={{ fontSize: 24 }}>{achPopup.icon}</span>
      <div>
        <div style={{ fontSize: 9, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 2, color: achPopup.secret ? "#e0a0a0" : "#c8e0c0" }}>{achPopup.secret ? "Secret Achievement!" : achPopup.tierLabel || "Achievement!"}</div>
        <div style={{ fontSize: 14, fontWeight: 700, color: "#f0e8d8" }}>{achPopup.name}</div>
      </div>
    </div>
  ) : null;

  // ═══ TITLE ═══
  if (screen === "title") return (
    <div style={base}>{fonts}{popupEl}
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24, textAlign: "center" }}>
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "radial-gradient(ellipse at 50% 30%, rgba(91,117,83,0.08) 0%, transparent 70%)", pointerEvents: "none" }} />
        <div style={{ fontSize: 10, letterSpacing: 8, textTransform: "uppercase", color: "var(--dim)", fontFamily: "var(--mono)", marginBottom: 32 }}>A Foreign Policy Strategy Game</div>
        <h1 style={{ fontSize: "clamp(36px, 8vw, 64px)", fontWeight: 800, lineHeight: 1.05, margin: 0, letterSpacing: -2 }}>Commander</h1>
        <h1 style={{ fontSize: "clamp(24px, 5vw, 40px)", fontWeight: 400, fontStyle: "italic", color: "var(--dim)", lineHeight: 1.2, margin: "4px 0 0 0" }}>in Chief</h1>
        <div style={{ width: 80, height: 2, background: "#5B7553", margin: "24px auto" }} />
        <p style={{ fontSize: 14, color: "var(--dim)", maxWidth: 420, lineHeight: 1.6, margin: "0 0 20px 0", fontFamily: "var(--sans)" }}>Treasury. Alliances. Wars. Loans. 150 years of foreign policy.</p>
        <div style={{ marginBottom: 20, width: "100%", maxWidth: 280 }}>
          <input value={nameInput} onChange={function(e) { setNameInput(e.target.value); }} placeholder="Your Presidential Name" maxLength={30}
            style={{ width: "100%", padding: "10px 14px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 6, color: "var(--text)", fontFamily: "var(--serif)", fontSize: 16, textAlign: "center", outline: "none", boxSizing: "border-box" }} />
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
          <Btn onClick={function() { setPlayerName(nameInput || "Mr. President"); setScreen("settings"); }} style={{ background: "#5B7553", color: "#f0e8d8", padding: "16px 44px", letterSpacing: 4, fontSize: 15, fontWeight: 800 }}>Play</Btn>
          <Btn onClick={function() { setScreen("achievements"); }} style={{ background: "transparent", color: "var(--dim)", border: "1px solid var(--border)", padding: "16px 20px", fontSize: 20 }}>{"\u{1F3C6}"}</Btn>
        </div>
      </div>
    </div>
  );

  if (screen === "achievements") return (
    <div style={base}>{fonts}{popupEl}
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24 }}>
        <h2 style={{ fontSize: 26, fontWeight: 700, margin: "0 0 20px 0" }}>Achievements</h2>
        <div style={{ width: "100%", maxWidth: 420 }}><AchPanel achievements={achievements} /></div>
        <Btn onClick={function() { setScreen("title"); }} style={{ marginTop: 20, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)" }}>Back</Btn>
      </div>
    </div>
  );

  if (screen === "settings") {
    var selDiff = DIFF[difficulty];
    return (
    <div style={base}>{fonts}{popupEl}
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24 }}>
        <h2 style={{ fontSize: 26, fontWeight: 700, margin: "0 0 24px 0" }}>Choose a Difficulty</h2>
        <div style={{ width: "100%", maxWidth: 420 }}>
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {Object.keys(DIFF).map(function(key) { var d = DIFF[key]; var got = achievements["beat_" + key]; return (
                <button key={key} onClick={function() { setDifficulty(key); }} style={{ padding: "12px 14px", background: difficulty === key ? "rgba(91,117,83,0.2)" : "var(--card)", border: "1px solid " + (difficulty === key ? "#5B7553" : "var(--border)"), borderRadius: 6, cursor: "pointer", textAlign: "left", color: "var(--text)", transition: "all 0.2s" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 15, fontFamily: "var(--serif)", fontWeight: difficulty === key ? 700 : 400 }}>{d.label}</span>
                    {got && <span style={{ fontSize: 14 }}>{"\u2705"}</span>}
                  </div>
                  <div style={{ fontSize: 11, fontFamily: "var(--sans)", color: "var(--dim)", marginTop: 3, fontStyle: "italic" }}>{d.flavor}</div>
                </button>
              ); })}
            </div>
          </div>
          <div style={{ padding: 16, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 2, color: "var(--dim)", marginBottom: 10 }}>{selDiff.label}{" \u2014 Details"}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontFamily: "var(--sans)", fontSize: 13, lineHeight: 1.6 }}>
              <div>{"💰 Starting Gold"}<div style={{ fontWeight: 700, color: "#DAA520" }}>{money(selDiff.startGold)}</div></div>
              <div>{"📊 Penalty Multiplier"}<div style={{ fontWeight: 700, color: selDiff.punishMult > 1.2 ? "#B54444" : "var(--text)" }}>{selDiff.punishMult}{"x"}</div></div>

              <div>{"🏦 Loan Requirement"}<div style={{ fontWeight: 700 }}>{"+"}{selDiff.loanReq}{" rep"}</div></div>
              <div>{"\u{1F3B2} Reroll Cost"}<div style={{ fontWeight: 700 }}>{money(selDiff.rerollCost)}</div></div>
              <div>{"📈 Cost Multiplier"}<div style={{ fontWeight: 700 }}>{selDiff.costMult}{"x"}</div></div>
              <div>{"💵 Income Multiplier"}<div style={{ fontWeight: 700, color: "#5B8C5A" }}>{selDiff.goldMult}{"x"}</div></div>
            </div>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 10, fontFamily: "var(--mono)", color: "var(--dim)" }}>{"Events: "}{eventCount}</label>
            <input type="range" min={10} max={30} step={1} value={eventCount} onChange={function(e) { setEventCount(parseInt(e.target.value)); }} style={{ width: "100%", accentColor: "#5B7553" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)", marginTop: 2 }}>
              <span>10 Quick</span><span>20 Standard</span><span>30 Full</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn onClick={function() { setScreen("title"); }} style={{ flex: 1, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)" }}>Back</Btn>
            <Btn onClick={function() { initGame(); setScreen("game"); }} style={{ flex: 2, background: "#5B7553", color: "#f0e8d8", fontWeight: 700 }}>Start</Btn>
          </div>
        </div>
      </div>
    </div>
    );
  }

  // ═══ GAME OVER ═══
  if (screen === "game" && gameOver) {
    var isWin = gameOver === "victory";
    var score = Math.round((stats.dom + stats.intl + stats.pwr + 150) / 3);
    var grade = score >= 90 ? "S" : score >= 75 ? "A" : score >= 60 ? "B" : score >= 45 ? "C" : score >= 30 ? "D" : "F";
    return (
      <div style={base}>{fonts}{popupEl}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24, textAlign: "center" }}>
          <div style={{ fontSize: 10, letterSpacing: 6, textTransform: "uppercase", color: isWin ? "#5B7553" : "#B54444", fontFamily: "var(--mono)", marginBottom: 12 }}>{isWin ? "Your Legacy" : "Presidency Ended"}</div>
          <div style={{ fontSize: 64, fontWeight: 800, color: grade === "S" ? "#DAA520" : grade === "F" ? "#B54444" : "var(--text)", lineHeight: 1 }}>{grade}</div>
          <div style={{ fontSize: 12, color: "var(--dim)", fontFamily: "var(--mono)", marginBottom: 16 }}>{playerName}{" | "}{score}{"/100 | "}{diff.label}</div>
          {!isWin && <p style={{ fontSize: 14, color: "#B54444", maxWidth: 380, lineHeight: 1.5, marginBottom: 12 }}>{gameOver}</p>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginBottom: 12, width: "100%", maxWidth: 300 }}>
            {[{ l: "Dom", v: stats.dom }, { l: "Intl", v: stats.intl }, { l: "Pwr", v: stats.pwr }].map(function(s) { return (
              <div key={s.l} style={{ padding: 8, background: "var(--card)", borderRadius: 6, border: "1px solid var(--border)", textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 700, color: s.v > 0 ? "#5B8C5A" : "#B54444" }}>{s.v}</div>
                <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)" }}>{s.l}</div>
              </div>
            ); })}
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
            <Btn onClick={function() { setScreen("title"); setGameOver(null); }} style={{ background: "transparent", color: "var(--dim)", border: "1px solid var(--border)", padding: "10px 16px" }}>Menu</Btn>
            <Btn onClick={function() { setScreen("achievements"); }} style={{ background: "transparent", color: "#DAA520", border: "1px solid rgba(218,165,32,0.3)", padding: "10px 16px" }}>{"\u{1F3C6}"}</Btn>
            <Btn onClick={function() { initGame(); setGameOver(null); }} style={{ background: "#5B7553", color: "#f0e8d8", padding: "10px 16px" }}>Again</Btn>
          </div>
        </div>
      </div>
    );
  }

  // ═══ MAIN GAME ═══
  if (screen === "game" && evt) {
    var tabS = function(k) { return { flex: 1, padding: "9px 6px", background: tab === k ? "var(--card)" : "transparent", border: "none", borderBottom: tab === k ? "2px solid " + era.color : "2px solid transparent", color: tab === k ? "var(--text)" : "var(--dim)", cursor: "pointer", fontSize: 10, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 1 }; };

    return (
      <div style={base}>{fonts}{popupEl}
        {loanModal && <Modal onClose={function() { setLoanModal(null); }}>
          <div style={{ fontSize: 16, marginBottom: 8 }}>{(NATIONS.find(function(n) { return n.id === loanModal; }) || {}).flag}{" Loan"}</div>
          <div style={{ fontSize: 11, color: "#B54444", fontFamily: "var(--sans)", marginBottom: 8 }}>{"Drains ~"}{Math.max(2, Math.round(loanAmt * 0.15))}{" rep/turn"}</div>
          <div style={{ fontSize: 10, fontFamily: "var(--mono)", color: "var(--dim)" }}>{money(loanAmt)}</div>
          <input type="range" min={5} max={100} step={5} value={loanAmt} onChange={function(e) { setLoanAmt(parseInt(e.target.value)); }} style={{ width: "100%", accentColor: "#DAA520", margin: "6px 0" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <Btn onClick={function() { setLoanModal(null); }} style={{ flex: 1, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)", padding: "8px" }}>X</Btn>
            <Btn onClick={function() { takeLoan(loanModal, loanAmt); }} style={{ flex: 2, background: "#DAA520", color: "#1a1915", fontWeight: 700, padding: "8px" }}>Take Loan</Btn>
          </div>
        </Modal>}
        {repayModal && <Modal onClose={function() { setRepayModal(null); }}>
          <div style={{ fontSize: 14, marginBottom: 6 }}>{"Repay "}{(NATIONS.find(function(n) { return n.id === repayModal; }) || {}).flag}</div>
          <input type="range" min={5} max={Math.max(5, Math.min(gold, loans[repayModal] || 0))} step={5} value={Math.min(repayAmt, gold, loans[repayModal] || 0)} onChange={function(e) { setRepayAmt(parseInt(e.target.value)); }} style={{ width: "100%", accentColor: "#5B8C5A", margin: "6px 0" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <Btn onClick={function() { setRepayModal(null); }} style={{ flex: 1, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)", padding: "8px" }}>X</Btn>
            <Btn onClick={function() { repayLoan(repayModal, repayAmt); }} style={{ flex: 2, background: "#5B8C5A", color: "#f0e8d8", fontWeight: 700, padding: "8px" }}>{"Repay "}{money(Math.min(repayAmt, gold, loans[repayModal] || 0))}</Btn>
          </div>
        </Modal>}

        <div style={{ position: "sticky", top: 0, zIndex: 20, background: "var(--bg)", borderBottom: "1px solid var(--border)" }}>
          <div style={{ display: "flex", borderBottom: "1px solid var(--border)" }}>
            <button style={tabS("event")} onClick={function() { setTab("event"); }}>{"📜 Event"}</button>
            <button style={tabS("diplomacy")} onClick={function() { setTab("diplomacy"); }}>{"🤝 Diplomacy"}</button>
            <button style={tabS("profile")} onClick={function() { setTab("profile"); }}>{"👤 Profile"}</button>
          </div>
          <div style={{ padding: "6px 10px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontSize: 9, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 2, color: era.color }}>{era.name}{" "}{evt.year}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {warCount > 0 && <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#ff4444", fontWeight: 700 }}>{"\u2694"}{warCount}</span>}
                <span style={{ fontSize: 11, fontFamily: "var(--mono)", color: gold < 20 ? "#B54444" : "#DAA520", fontWeight: 700 }}>{"💰"}{money(gold)}</span>
                <span style={{ fontSize: 8, fontFamily: "var(--mono)", color: income >= 0 ? "#5B8C5A" : "#B54444" }}>{signedM(income)}</span>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
              <div>
                <StatBar label="Dom" value={stats.dom} icon={"\u{1F3DB}"} color="#5B8C5A" warn={diff.goThresh} desc={domDesc} compact />
                {!usedEmergency.fundraise && <button onClick={emergencyFundraise} style={{ width: "100%", padding: "3px 0", fontSize: 8, fontFamily: "var(--mono)", background: "rgba(218,165,32,0.08)", color: "#DAA520", border: "1px solid rgba(218,165,32,0.2)", borderRadius: 3, cursor: "pointer", marginTop: 2 }}>{"💰 Emergency +40M"}</button>}
              </div>
              <div>
                <StatBar label="Intl" value={stats.intl} icon={"\u{1F30D}"} color="#4A7FB5" warn={diff.goThresh} desc={intlDesc} compact />
                {!usedEmergency.rally && <button onClick={emergencyRally} style={{ width: "100%", padding: "3px 0", fontSize: 8, fontFamily: "var(--mono)", background: "rgba(91,117,83,0.08)", color: "#5B8C5A", border: "1px solid rgba(91,117,83,0.2)", borderRadius: 3, cursor: "pointer", marginTop: 2 }}>{"\u{1F3DB} Rally +12 Dom"}</button>}
              </div>
              <div>
                <StatBar label="Pwr" value={stats.pwr} icon={"\u2694"} color="#B5854A" warn={diff.goThresh} desc={pwrDesc} compact />
                {warCount > 0 && !usedEmergency.ceasefire && gold >= Math.round(25 * diff.costMult) && <button onClick={function() { emergencyCeasefire(warNids[0]); }} style={{ width: "100%", padding: "3px 0", fontSize: 8, fontFamily: "var(--mono)", background: "rgba(74,127,181,0.08)", color: "#4A7FB5", border: "1px solid rgba(74,127,181,0.2)", borderRadius: 3, cursor: "pointer", marginTop: 2 }}>{"\u2694 Ceasefire"}</button>}
              </div>
            </div>
          </div>
        </div>

        <div style={{ padding: "12px 10px 80px 10px", maxWidth: 540, margin: "0 auto" }}>
          {tab === "event" && (
            <div style={{ opacity: fadeIn ? 1 : 0, transform: fadeIn ? "translateY(0)" : "translateY(10px)", transition: "all 0.25s ease" }}>
              {warCount > 0 && <div style={{ padding: "6px 10px", background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", borderRadius: 6, marginBottom: 8, fontSize: 11, fontFamily: "var(--sans)", color: "#ff6666" }}>
                {"\u2694 At war with "}{warCount}{" nation"}{warCount > 1 ? "s" : ""}{" \u2014 costs at "}{Math.round(calcWarCostMult() * 100)}{"%"}
              </div>}

              <div style={{ textAlign: "center", marginBottom: 4 }}>
                <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)", textTransform: "uppercase", letterSpacing: 2 }}>{"Event "}{idx + 1}{"/"}{gameEvents.length}</span>
              </div>
              <h2 style={{ textAlign: "center", fontSize: "clamp(18px, 4vw, 24px)", fontWeight: 700, margin: "6px 0", lineHeight: 1.2 }}>{evt.title}</h2>
              <p style={{ fontSize: 14, lineHeight: 1.7, textAlign: "center", margin: "6px 0 14px 0", fontFamily: "var(--sans)" }}>{evt.desc}</p>

              {!result ? (
                <div>
                  {allBroke && (
                    <div style={{ padding: "10px 14px", background: "rgba(218,165,32,0.1)", border: "1px solid rgba(218,165,32,0.3)", borderRadius: 6, marginBottom: 10 }}>
                      <div style={{ fontSize: 10, fontFamily: "var(--mono)", color: "#DAA520", marginBottom: 6 }}>Treasury Empty</div>
                      {loanableNat.length > 0 ? (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                          {loanableNat.map(function(n) { return <button key={n.id} onClick={function() { setLoanModal(n.id); setLoanAmt(20); }} style={{ padding: "4px 10px", background: "rgba(218,165,32,0.15)", border: "1px solid rgba(218,165,32,0.4)", borderRadius: 4, cursor: "pointer", fontSize: 11, fontFamily: "var(--sans)", color: "var(--text)" }}>{n.flag}{" "}{n.name}</button>; })}
                        </div>
                      ) : (
                        <div>
                          <button onClick={faceConsequences} style={{ width: "100%", padding: 12, fontSize: 12, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 2, background: "rgba(181,68,68,0.15)", color: "#ff6666", border: "1px solid rgba(181,68,68,0.4)", borderRadius: 6, cursor: "pointer", fontWeight: 700 }}>{"💀 Face Consequences"}</button>
                        </div>
                      )}
                    </div>
                  )}
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {shownChoices.map(function(c, i) {
                      var cost = costOf(c); var ok = cost <= gold;
                      return (
                        <button key={shownChoiceIdxs[i]} onClick={function() { if (ok) applyChoice(c); }} disabled={!ok} style={{ padding: "12px 14px", background: ok ? "var(--card)" : "rgba(28,27,23,0.5)", border: "1px solid " + (ok ? "var(--border)" : "#2a2920"), borderRadius: 6, color: ok ? "var(--text)" : "#5a5548", fontFamily: "var(--sans)", fontSize: 13, lineHeight: 1.4, textAlign: "left", cursor: ok ? "pointer" : "not-allowed", opacity: ok ? 1 : 0.5 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 6 }}>
                            <div><span style={{ color: era.color, fontWeight: 700, marginRight: 4, fontFamily: "var(--serif)" }}>{["I.", "II.", "III."][i]}</span>{c.text}</div>
                            {cost > 0 && <span style={{ fontSize: 10, fontFamily: "var(--mono)", color: ok ? "#DAA520" : "#B54444", whiteSpace: "nowrap", fontWeight: 700 }}>{money(cost)}</span>}
                          </div>
                          <div style={{ display: "flex", gap: 6, marginTop: 4, fontSize: 9, fontFamily: "var(--mono)", flexWrap: "wrap" }}>
                            {c.dom !== 0 && <span style={{ color: c.dom > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F3DB}"}{signed(c.dom)}</span>}
                            {c.intl !== 0 && <span style={{ color: c.intl > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F30D}"}{signed(c.intl)}</span>}
                            {c.pwr !== 0 && <span style={{ color: c.pwr > 0 ? "#5B8C5A" : "#B54444" }}>{"\u2694"}{signed(c.pwr)}</span>}
                            {(c.gold || 0) > 0 && <span style={{ color: "#DAA520" }}>{"💰+"}{c.gold}</span>}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                  {/* Reroll button */}
                  <div style={{ textAlign: "center", marginTop: 8 }}>
                    <Btn onClick={rerollChoices} disabled={gold < diff.rerollCost} style={{ padding: "6px 16px", fontSize: 10, background: "rgba(74,127,181,0.1)", color: gold < diff.rerollCost ? "var(--dim)" : "#4A7FB5", border: "1px solid rgba(74,127,181,0.3)" }}>
                      {"\u{1F3B2} Reroll Choices ("}{money(diff.rerollCost)}{")"}
                    </Btn>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ padding: "10px 14px", background: result.isFaceConsequences ? "rgba(181,68,68,0.08)" : "rgba(91,117,83,0.08)", border: "1px solid " + (result.isFaceConsequences ? "rgba(181,68,68,0.2)" : "rgba(91,117,83,0.2)"), borderRadius: 6, marginBottom: 8 }}>
                    <div style={{ fontSize: 9, textTransform: "uppercase", letterSpacing: 2, color: result.isFaceConsequences ? "#B54444" : "#5B7553", fontFamily: "var(--mono)", marginBottom: 3 }}>{result.isFaceConsequences ? "Consequences" : "Decision"}</div>
                    <div style={{ fontSize: 13, lineHeight: 1.4, fontFamily: "var(--sans)" }}>{result.text}</div>
                  </div>
                  <div style={{ padding: "8px 12px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 6, marginBottom: 8 }}>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, fontSize: 10, fontFamily: "var(--mono)" }}>
                      {result.dom !== 0 && <span style={{ color: result.dom > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F3DB}"}{applyStat(result.dom, stats.dom)}</span>}
                      {result.intl !== 0 && <span style={{ color: result.intl > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F30D}"}{applyStat(result.intl, stats.intl)}</span>}
                      {result.pwr !== 0 && <span style={{ color: result.pwr > 0 ? "#5B8C5A" : "#B54444" }}>{"\u2694"}{applyStat(result.pwr, stats.pwr)}</span>}
                      {result.actualCost > 0 && <span style={{ color: "#B54444" }}>{"💰-"}{money(result.actualCost)}</span>}
                      {result.purchase && <span style={{ color: "#DAA520" }}>{"🗺"}{result.purchase}</span>}
                    </div>
                  </div>
                  {showTerm && <div style={{ margin: "8px 0", padding: "10px 14px", background: evt.termDef.startsWith("\u2605") ? "rgba(218,165,32,0.05)" : "rgba(91,117,83,0.05)", border: "1px solid " + (evt.termDef.startsWith("\u2605") ? "rgba(218,165,32,0.2)" : "rgba(91,117,83,0.2)"), borderRadius: 6, fontSize: 12, lineHeight: 1.5, fontFamily: "var(--sans)" }}>
                    <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: evt.termDef.startsWith("\u2605") ? "#DAA520" : "#5B7553", marginBottom: 3 }}>{evt.termDef.startsWith("\u2605") ? "Bonus" : "📖 Term"}</div>
                    {evt.termDef}
                  </div>}
                  <Btn onClick={nextEvent} style={{ width: "100%", marginTop: 6, background: era.color, color: "#f0e8d8" }}>
                    {idx + 1 >= gameEvents.length ? "Legacy \u2192" : "Next \u2192 (+" + money(income) + ")"}
                  </Btn>
                </div>
              )}
            </div>
          )}

          {tab === "diplomacy" && (
            <div>
              <div style={{ textAlign: "center", marginBottom: 10 }}>
                <h3 style={{ fontSize: 18, fontWeight: 700, margin: "6px 0 3px" }}>Relations</h3>
                <p style={{ fontSize: 9, color: "var(--dim)", fontFamily: "var(--mono)" }}>{"Drift: "}{signed(repDrift)}{"/turn | Tap for details"}</p>
              </div>
              {Object.keys(loans).filter(function(k) { return loans[k] > 0; }).length > 0 && (
                <div style={{ padding: "8px 12px", background: "rgba(218,165,32,0.06)", border: "1px solid rgba(218,165,32,0.2)", borderRadius: 6, marginBottom: 8, fontSize: 11, fontFamily: "var(--sans)" }}>
                  {Object.keys(loans).filter(function(k) { return loans[k] > 0; }).map(function(nid) {
                    var n = NATIONS.find(function(nn) { return nn.id === nid; }); if (!n) return null;
                    return <div key={nid} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                      <span>{n.flag}{" "}{money(loans[nid])}{" (-"}{Math.max(2, Math.round(loans[nid] * 0.15))}{"/t)"}</span>
                      {gold >= 5 && <Btn onClick={function() { setRepayModal(nid); setRepayAmt(Math.min(10, gold, loans[nid])); }} style={{ padding: "2px 8px", fontSize: 9, background: "#5B8C5A", color: "#f0e8d8" }}>Pay</Btn>}
                    </div>;
                  })}
                </div>
              )}
              {activeNat.map(function(n) {
                var v = relations[n.id] || 0; var atW = !!wars[n.id]; var hasL = (loans[n.id] || 0) > 0; var isE = !!expNation[n.id]; var info = getNationInfo(n.id);
                var col = atW ? "#ff4444" : v > 20 ? "#5B8C5A" : v > 0 ? "#7A9A6A" : v > -10 ? "#B5854A" : "#B54444";
                var lab = atW ? "WAR" : v > 30 ? "Allied" : v > 10 ? "Friend" : v > -10 ? "Neutral" : v > -30 ? "Tense" : "Hostile";
                return (
                  <div key={n.id} style={{ marginBottom: 2 }}>
                    <div onClick={function() { setExpNation(function(p) { var o = Object.assign({}, p); o[n.id] = !o[n.id]; return o; }); }} style={{ cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 10px", background: atW ? "rgba(255,68,68,0.06)" : "#1c1b17", border: "1px solid " + (atW ? "rgba(255,68,68,0.2)" : "#2e2d28"), borderRadius: isE ? "6px 6px 0 0" : 6 }}>
                      <span style={{ fontSize: 12 }}>{n.flag}{" "}<span style={{ fontFamily: "var(--serif)", fontSize: 12 }}>{n.name}</span></span>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 10, fontFamily: "var(--mono)", color: col, fontWeight: 600 }}>{lab}{" "}{signed(v)}</span>
                        <span style={{ fontSize: 10, color: "var(--dim)", transform: isE ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", display: "inline-block" }}>{"\u25BC"}</span>
                      </div>
                    </div>
                    {isE && <div style={{ padding: "8px 12px", background: "rgba(30,29,24,0.8)", border: "1px solid var(--border)", borderTop: "none", borderRadius: "0 0 6px 6px", marginBottom: 3 }}>
                      {info.impacts.length > 0 && info.impacts.map(function(imp, ix) { return <div key={ix} style={{ display: "flex", justifyContent: "space-between", fontSize: 10, fontFamily: "var(--sans)", padding: "1px 0" }}>
                        <span>{imp.ongoing ? "🔄 " : ""}{imp.title}</span>
                        <span style={{ fontFamily: "var(--mono)", color: imp.amount > 0 ? "#5B8C5A" : "#B54444" }}>{signed(imp.amount)}{imp.ongoing ? "/t" : ""}</span>
                      </div>; })}
                      {info.hints.length > 0 && info.hints.map(function(h, hx) { return <div key={hx} style={{ fontSize: 10, color: "#8ab4d6", paddingLeft: 6, borderLeft: "2px solid rgba(74,127,181,0.3)", marginTop: 3, fontFamily: "var(--sans)" }}>{h}</div>; })}
                      <div style={{ display: "flex", gap: 4, marginTop: 5 }}>
                        {canLoan(n.id) && !atW && <Btn onClick={function() { setLoanModal(n.id); setLoanAmt(20); }} style={{ padding: "3px 8px", fontSize: 8, background: "rgba(218,165,32,0.1)", color: "#DAA520", border: "1px solid rgba(218,165,32,0.2)" }}>Loan</Btn>}
                        {hasL && gold >= 5 && <Btn onClick={function() { setRepayModal(n.id); setRepayAmt(Math.min(10, gold, loans[n.id])); }} style={{ padding: "3px 8px", fontSize: 8, background: "rgba(91,140,90,0.1)", color: "#5B8C5A", border: "1px solid rgba(91,140,90,0.2)" }}>Pay</Btn>}
                        {atW && !usedEmergency.ceasefire && gold >= Math.round(25 * diff.costMult) && <Btn onClick={function() { emergencyCeasefire(n.id); }} style={{ padding: "3px 8px", fontSize: 8, background: "rgba(74,127,181,0.1)", color: "#4A7FB5", border: "1px solid rgba(74,127,181,0.2)" }}>{"Ceasefire "}{money(Math.round(25 * diff.costMult))}</Btn>}
                      </div>
                    </div>}
                  </div>
                );
              })}
            </div>
          )}

          {tab === "profile" && (
            <div>
              <div style={{ textAlign: "center", marginBottom: 12 }}>
                <h3 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>{playerName}</h3>
                <p style={{ fontSize: 10, color: "var(--dim)", fontFamily: "var(--mono)" }}>{diff.label}{" | "}{evt.year}</p>
              </div>
              <div style={{ padding: 12, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, fontFamily: "var(--sans)", fontSize: 11 }}>
                  <div>{"💰 "}{money(gold)}</div><div>{"📊 "}{signedM(income)}{"/t"}</div>
                  <div>{"📈 "}{money(earned)}{" earned"}</div><div>{"📉 "}{money(spent)}{" spent"}</div>
                </div>
              </div>
              <div style={{ padding: 12, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <StatBar label="Domestic" value={stats.dom} icon={"\u{1F3DB}"} color="#5B8C5A" warn={diff.goThresh} desc={domDesc} />
                <StatBar label="International" value={stats.intl} icon={"\u{1F30D}"} color="#4A7FB5" warn={diff.goThresh} desc={intlDesc} />
                <StatBar label="Power" value={stats.pwr} icon={"\u2694"} color="#B5854A" warn={diff.goThresh} desc={pwrDesc} />
              </div>
              {purchases.length > 0 && <div style={{ padding: 10, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>{purchases.map(function(p, i) { return <span key={i} style={{ padding: "2px 6px", background: "rgba(91,117,83,0.1)", borderRadius: 3, fontSize: 10, fontFamily: "var(--mono)" }}>{p}</span>; })}</div>
              </div>}
              <div style={{ padding: 10, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)", marginBottom: 4 }}>{"History ("}{history.length}{")"}</div>
                <div style={{ maxHeight: 200, overflow: "auto" }}>
                  {history.map(function(h, i) {
                    var isE2 = !!expHistory[i]; var isBon = h.event.termDef.startsWith("\u2605");
                    return <div key={i} style={{ borderBottom: i < history.length - 1 ? "1px solid var(--border)" : "none" }}>
                      <button onClick={function() { setExpHistory(function(p) { var o = Object.assign({}, p); o[i] = !o[i]; return o; }); }} style={{ width: "100%", padding: "5px 2px", background: "transparent", border: "none", cursor: "pointer", textAlign: "left", color: "var(--text)", display: "flex", justifyContent: "space-between" }}>
                        <span style={{ fontSize: 11, fontFamily: "var(--sans)" }}><span style={{ fontFamily: "var(--mono)", fontSize: 9, color: "var(--dim)" }}>{h.event.year}{" "}</span>{h.event.title.replace(" \u2605", "")}</span>
                        <span style={{ fontSize: 9, color: "var(--dim)", transform: isE2 ? "rotate(180deg)" : "" }}>{"\u25BC"}</span>
                      </button>
                      {isE2 && <div style={{ padding: "4px 8px 8px", fontSize: 11, fontFamily: "var(--sans)", lineHeight: 1.4, background: isBon ? "rgba(218,165,32,0.03)" : "rgba(91,117,83,0.03)", borderRadius: 3 }}>
                        <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: isBon ? "#DAA520" : "#5B7553", marginBottom: 2 }}>{isBon ? "Bonus" : "📖"}</div>
                        {h.event.termDef}
                      </div>}
                    </div>;
                  })}
                </div>
              </div>
              <div style={{ padding: 10, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}><AchPanel achievements={achievements} /></div>
              <div style={{ padding: 10, background: "rgba(181,68,68,0.05)", border: "1px solid rgba(181,68,68,0.15)", borderRadius: 8 }}>
                <Btn onClick={function() { checkEndAch(); setGameOver("victory"); }} style={{ width: "100%", background: "rgba(181,68,68,0.1)", color: "#ff6666", border: "1px solid rgba(181,68,68,0.2)", fontWeight: 700, padding: "8px" }}>Abandon Run</Btn>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }
  return null;
}
